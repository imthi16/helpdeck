name: helpdeck

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: helpdeck
      POSTGRES_PASSWORD: helpdeck
      POSTGRES_DB: helpdeck
    ports:
      # Host port 5433 to avoid clashing with other local Postgres stacks.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Provisions the helpdeck_app login role (runs only on first init of the
      # data volume). See init/01-app-role.sql.
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdeck -d helpdeck"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      # Host port 6380 to avoid clashing with other local Redis stacks.
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local, free, open-source LLM + embeddings. The app reaches this via
  # OLLAMA_BASE_URL (litellm gateway). CPU-only by default; add a GPU runtime for
  # speed. Models live in the named volume so they persist across restarts.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: pull the default models, then exit. Re-runs are no-ops (already
  # present). qwen2.5:7b (~4.7GB) backs the strong route; llama3.2:3b the cheap
  # route; nomic-embed-text the embeddings. Trim this if you override the models.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint:
      - /bin/sh
      - -c
      - "ollama pull llama3.2:3b && ollama pull qwen2.5:7b && ollama pull nomic-embed-text"
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
