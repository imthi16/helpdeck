[project]
name = "helpdeck-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.18.5",
    "arq>=0.28.0",
    "asyncpg>=0.31.0",
    "fastapi>=0.139.0",
    "httpx>=0.28.1",
    "langfuse>=4.13.2",
    "openai>=2.44.0",
    "pgvector>=0.5.0",
    "pydantic-settings>=2.14.2",
    "pypdf>=6.14.2",
    "sqlalchemy[asyncio]>=2.0.51",
    "structlog>=26.1.0",
    "tiktoken>=0.13.0",
    "trafilatura>=2.1.0",
    "uvicorn[standard]>=0.51.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.20",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.ruff.lint.per-file-ignores]
# Migration template always imports op/sa; empty migrations don't use them.
# Autogenerated DDL lines routinely exceed the line limit.
"alembic/versions/*" = ["F401", "E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
