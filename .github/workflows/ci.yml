name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: helpdeck
          POSTGRES_PASSWORD: helpdeck
          POSTGRES_DB: helpdeck
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U helpdeck -d helpdeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync
      # Provision the app login role out of band (the RLS migration never
      # handles credentials). Mirrors infra/init/01-app-role.sql for dev.
      - name: Provision helpdeck_app login role
        env:
          PGPASSWORD: helpdeck
        run: |
          psql -h localhost -p 5433 -U helpdeck -d helpdeck -v ON_ERROR_STOP=1 -c "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'helpdeck_app') THEN
              CREATE ROLE helpdeck_app LOGIN PASSWORD 'helpdeck_app'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            ELSE
              ALTER ROLE helpdeck_app LOGIN PASSWORD 'helpdeck_app'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            END IF;
          END
          \$\$;"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  widget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/widget/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Enforce 60KB gzipped bundle budget
        run: |
          SIZE=$(gzip -c dist/helpdeck.js | wc -c)
          echo "helpdeck.js gzipped: ${SIZE} bytes (budget 61440)"
          if [ "$SIZE" -gt 61440 ]; then
            echo "::error::Widget bundle exceeds 60KB gzipped budget"
            exit 1
          fi

  widget-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: helpdeck
          POSTGRES_PASSWORD: helpdeck
          POSTGRES_DB: helpdeck
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U helpdeck -d helpdeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install API deps
        working-directory: apps/api
        run: uv sync
      # The API now serves tenant data as helpdeck_app; provision its login
      # here just like the api job (the RLS migration never handles credentials).
      - name: Provision helpdeck_app login role
        env:
          PGPASSWORD: helpdeck
        run: |
          psql -h localhost -p 5433 -U helpdeck -d helpdeck -v ON_ERROR_STOP=1 -c "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'helpdeck_app') THEN
              CREATE ROLE helpdeck_app LOGIN PASSWORD 'helpdeck_app'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            ELSE
              ALTER ROLE helpdeck_app LOGIN PASSWORD 'helpdeck_app'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            END IF;
          END
          \$\$;"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/widget/pnpm-lock.yaml
      - name: Install widget deps
        working-directory: apps/widget
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        working-directory: apps/widget
        run: pnpm exec playwright install --with-deps chromium
      - name: Run widget E2E
        working-directory: apps/widget
        run: pnpm exec playwright test
