name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: helpdeck
          POSTGRES_PASSWORD: helpdeck
          POSTGRES_DB: helpdeck
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U helpdeck -d helpdeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  widget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/widget/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Enforce 60KB gzipped bundle budget
        run: |
          SIZE=$(gzip -c dist/helpdeck.js | wc -c)
          echo "helpdeck.js gzipped: ${SIZE} bytes (budget 61440)"
          if [ "$SIZE" -gt 61440 ]; then
            echo "::error::Widget bundle exceeds 60KB gzipped budget"
            exit 1
          fi
